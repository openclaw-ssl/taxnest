<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none" role="img" aria-label="TaxNest">
  <!-- Geometric nest/home icon -->
  <g>
    <!-- Folded document / nest shape icon -->
    <rect x="2" y="8" width="22" height="26" rx="3" fill="#1E3A5F"/>
    <path d="M18 8 L24 8 L24 14" stroke="#3ECFCF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="7" y1="17" x2="19" y2="17" stroke="#3ECFCF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="21" x2="19" y2="21" stroke="#3ECFCF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="25" x2="14" y2="25" stroke="#3ECFCF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: Tax (medium) + Nest (bold) -->
  <text x="32" y="28" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#1E3A5F" letter-spacing="-0.3">Tax</text>
  <text x="62" y="28" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#1E3A5F" letter-spacing="-0.3">Nest</text>
